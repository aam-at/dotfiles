# ==================
# GENERAL LAYOUT
# ==================
general {
  layout = dwindle

  allow_tearing = false  # Allows `immediate` window rule to work

  gaps_workspaces = 3
  gaps_in = 3
  gaps_out = 3
  border_size = 2
}

dwindle {
  preserve_split = true
  smart_split = false
  smart_resizing = true
}

master {
  mfact = 0.5
}
