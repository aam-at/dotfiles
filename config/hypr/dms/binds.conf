# Apps
$terminal = kitty
$browser = microsoft-edge-stable
$editor = emacsclient -c -a 'emacs --daemon'
$fileExplorer = thunar

# Modifiers
$mod = SUPER
$modShift = SUPER SHIFT
$modCtrl = SUPER CTRL
$modCtrlShift = SUPER SHIFT CTRL

# === Launchers / DMS Toggles ===
bind = $mod, T, exec, $terminal
bind = $mod, Return, exec, $terminal
bind = $mod, E, exec, $fileExplorer
bind = $mod, B, exec, $browser
bind = $mod, C, exec, $editor
bind = $mod, Space, exec, dms ipc call spotlight toggle
bind = $mod, V, exec, dms ipc call clipboard toggle
bind = $mod, M, exec, dms ipc call processlist focusOrToggle
bind = $mod, N, exec, dms ipc call notifications toggle
bind = $modShift, N, exec, dms ipc call notepad toggle
bind = $mod, Y, exec, dms ipc call dankdash wallpaper
bind = $mod, O, exec, dms ipc call hypr toggleOverview
bind = $mod, X, exec, dms ipc call powermenu toggle
bind = $mod, Comma, exec, dms ipc call settings focusOrToggle
bind = $modShift, Slash, exec, dms ipc call keybinds toggle hyprland

# === Security / Session ===
bind = SUPER ALT, L, exec, dms ipc call lock lock
bind = $modShift, E, exit
bind = CTRL ALT, Delete, exec, dms ipc call processlist focusOrToggle

# === Media / Brightness ===
bindel = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 3
bindel = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 3
bindl = , XF86AudioMute, exec, dms ipc call audio mute
bindl = , XF86AudioMicMute, exec, dms ipc call audio micmute
bindl = , XF86AudioPause, exec, dms ipc call mpris playPause
bindl = , XF86AudioPlay, exec, dms ipc call mpris playPause
bindl = , XF86AudioPrev, exec, dms ipc call mpris previous
bindl = , XF86AudioNext, exec, dms ipc call mpris next
bindel = CTRL, XF86AudioRaiseVolume, exec, dms ipc call mpris increment 3
bindel = CTRL, XF86AudioLowerVolume, exec, dms ipc call mpris decrement 3
bindel = , XF86MonBrightnessUp, exec, dms ipc call brightness increment 5 ""
bindel = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5 ""

# === Window Management ===
bind = $mod, Q, killactive
bind = $mod, F, fullscreen, 0
bind = SUPER ALT, F, fullscreen, 1
bind = $modShift, F, fullscreen, 1
bind = SUPER ALT, Space, togglefloating
bind = $modShift, T, togglefloating
# bind = SUPER, comma, togglegroup
bind = $modShift, W, exec, dms ipc call window-rules toggle
bind = $mod, TAB, cyclenext
bind = $modShift, TAB, cyclenext, prev

# === Focus / Move ===
# Focus navigation
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Window movement
bind = $modShift, left, movewindow, l
bind = $modShift, down, movewindow, d
bind = $modShift, up, movewindow, u
bind = $modShift, right, movewindow, r
bind = $modShift, H, movewindow, l
bind = $modShift, J, movewindow, d
bind = $modShift, K, movewindow, u
bind = $modShift, L, movewindow, r

# Column navigation
bind = $mod, Home, focuswindow, first
bind = $mod, End, focuswindow, last

# === Monitor Navigation / Send ===
# Focus monitor
bind = $modCtrl, left, focusmonitor, l
bind = $modCtrl, right, focusmonitor, r
bind = $modCtrl, H, focusmonitor, l
bind = $modCtrl, J, focusmonitor, d
bind = $modCtrl, K, focusmonitor, u
bind = $modCtrl, L, focusmonitor, r

# Send window to monitor
bind = $modCtrlShift, left, movewindow, mon:l
bind = $modCtrlShift, down, movewindow, mon:d
bind = $modCtrlShift, up, movewindow, mon:u
bind = $modCtrlShift, right, movewindow, mon:r
bind = $modCtrlShift, H, movewindow, mon:l
bind = $modCtrlShift, J, movewindow, mon:d
bind = $modCtrlShift, K, movewindow, mon:u
bind = $modCtrlShift, L, movewindow, mon:r

# === Workspace Navigation / Send ===
# Workspace navigation
bind = $mod, Page_Down, workspace, e+1
bind = $mod, Page_Up, workspace, e-1
bind = $mod, U, workspace, e+1
bind = $mod, I, workspace, e-1
bind = $modCtrl, down, movetoworkspace, e+1
bind = $modCtrl, up, movetoworkspace, e-1
bind = $modCtrl, U, movetoworkspace, e+1
bind = $modCtrl, I, movetoworkspace, e-1

# Workspace management
bind = CTRL SHIFT, R, exec, dms ipc call workspace-rename open

# Send to adjacent workspace
bind = $modShift, Page_Down, movetoworkspace, e+1
bind = $modShift, Page_Up, movetoworkspace, e-1
bind = $modShift, U, movetoworkspace, e+1
bind = $modShift, I, movetoworkspace, e-1

# Mouse wheel workspace navigation/send
bind = $mod, mouse_down, workspace, e-1
bind = $mod, mouse_up, workspace, e+1
bind = $modCtrl, mouse_down, movetoworkspace, e-1
bind = $modCtrl, mouse_up, movetoworkspace, e+1

# === Numbered Workspaces ===
# Navigate
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Send window
bind = $modShift, 1, movetoworkspace, 1
bind = $modShift, 2, movetoworkspace, 2
bind = $modShift, 3, movetoworkspace, 3
bind = $modShift, 4, movetoworkspace, 4
bind = $modShift, 5, movetoworkspace, 5
bind = $modShift, 6, movetoworkspace, 6
bind = $modShift, 7, movetoworkspace, 7
bind = $modShift, 8, movetoworkspace, 8
bind = $modShift, 9, movetoworkspace, 9
bind = $modShift, 0, movetoworkspace, 10

# === Special Workspaces ===
# Placeholder for direct toggle/send binds (Task 3)

# === Layout / Resize ===
# Column management
bind = $mod, bracketleft, layoutmsg, preselect l
bind = $mod, bracketright, layoutmsg, preselect r

# Layout controls
bind = $mod, R, layoutmsg, togglesplit
bind = $modCtrl, F, resizeactive, exact 100%

# Legacy scancode resize (Task 4 removes these)
bindd = $mod, code:20, Expand window left, resizeactive, -100 0
bindd = $mod, code:21, Shrink window left, resizeactive, 100 0

# Manual sizing
binde = $mod, minus, resizeactive, -10% 0
binde = $mod, equal, resizeactive, 10% 0
binde = $modCtrl, minus, resizeactive, -5% 0
binde = $modCtrl, equal, resizeactive, 5% 0
binde = $modShift, minus, resizeactive, 0 -10%
binde = $modShift, equal, resizeactive, 0 10%
binde = $modCtrlShift, minus, resizeactive, 0 -10%
binde = $modCtrlShift, equal, resizeactive, 0 10%

# === Mouse Drag ===
bindmd = $mod, mouse:272, Move window, movewindow
bindmd = $mod, mouse:273, Resize window, resizewindow

# === Screenshots / System ===
bind = , Print, exec, dms screenshot
bind = CTRL, Print, exec, dms screenshot full
bind = ALT, Print, exec, dms screenshot window
bind = $modShift, P, dpms, toggle
