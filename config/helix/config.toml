# SPDX-License-Identifier: MIT
#
# Spacemacs for Helix, see https://github.com/langston-barrett/spacelix

# TODO: Spacebones dark!
theme = "gruvbox"

# A few notes on what follows:
#
# - When a command is bound to a key, the default Helix keybinding is removed
#   (by setting the key to "no_op").
# - Keybindings are organized first by mode, then parent key, then
#   alphabetically.
# - Keybindings that match between Helix and Spacemacs are still explicitly
#   bound in case the Helix defaults change, but are marked `# default` for
#   clarity. (There are more to be done, however!)
# - Section names are inspired by the Spacemacs documentation.

# ---------------------------------------------------------
# Editor

[editor]
bufferline = "multiple"
mouse = true
true-color = true
color-modes = true
rulers = [80, 100, 120]
shell = ["fish", "-c"]
auto-save = { focus-lost = true, idle-timeout = 1000 }
auto-format = true
cursorline = true
popup-border = "all"
completion-timeout = 0
completion-replace = true
line-number = "relative"
scrolloff = 5
idle-timeout = 250
text-width = 100

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = true
ignore = true
parents = true
git-ignore = true
git-global = true
git-exclude = true

[editor.indent-guides]
render = true
character = "│"
skip-levels = 1

[editor.inline-diagnostics]
cursor-line = "hint"

[editor.lsp]
display-inlay-hints = true
enable = true

[editor.smart-tab]
enable = true
supersede-menu = false

[editor.soft-wrap]
enable = true
max-wrap = 25
wrap-indicator = "↪ "

[editor.statusline]
left = [
  "mode",
  "spinner",
  "file-name",
  "read-only-indicator",
  "file-modification-indicator",
]
center = [
  "diagnostics",
  "selections",
  "register",
  "position-percentage",
  "position",
]
right = ["file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.whitespace.render]
space = "none"
tab = "none"
newline = "none"

[editor.whitespace.characters]
space = "·"
tab = "→"
newline = "⏎"

# ---------------------------------------------------------
# Normal

[keys.normal]
"C-c" = "no_op"                                                                # default: toggle_comments, instead: SPC ;
";" = "toggle_comments"
"@" = "replay_macro"
"$" = "goto_line_end"
"*" = ["search_selection", "search_next"]
"0" = "goto_line_start"
"V" = ["select_mode", "extend_to_line_bounds"]
"D" = ["exit_select_mode", "select_mode", "goto_line_end", "delete_selection"]
"G" = "goto_last_line"
"J" = "join_selections"                                                        # vim J
"U" = "redo"                                                                   # vim U
"q" = "record_macro"
"~" = "switch_case"                                                            # vim ~
"C-d" = ["half_page_down", "align_view_center"]                                # centered scroll
"C-e" = "scroll_down"                                                          # vim C-e
"C-r" = "redo"
"C-u" = ["half_page_up", "align_view_center"]                                  # centered scroll
"C-y" = "scroll_up"                                                            # vim C-y
"H" = "goto_window_top"
"L" = "goto_window_bottom"
"M" = "goto_window_center"
"C-n" = "goto_next_buffer"
"C-p" = "goto_previous_buffer"
"C-w" = ":buffer-close"
"C-s" = ":write"
"C-f" = "file_picker"
"C-g" = "global_search"
"tab" = "goto_next_buffer"
"S-tab" = "goto_previous_buffer"

[keys.normal.space]
"space" = "command_palette"
"/" = "global_search"                                                          # Spacemacs SPC /
"f" = "file_picker"
"h" = "global_search"
"s" = ":write"

# Buffer manipulation
[keys.normal.space.b]
"b" = "buffer_picker"
"d" = ":buffer-close"
"D" = ":buffer-close!"
"n" = "goto_next_buffer"
"p" = "goto_previous_buffer"
"r" = ":reload"
"s" = ":new"
"y" = ["select_all", ":clipboard-yank"]
"Y" = ["select_all", "yank"]

# Case
[keys.normal.space.c]
"c" = "switch_case"
"l" = "switch_to_lowercase"
"u" = "switch_to_uppercase"

# Error handling
[keys.normal.space.e]
"l" = "workspace_diagnostics_picker"
"n" = "goto_next_diag"
"p" = "goto_prev_diag"
"g" = "goto_first_diag"
"G" = "goto_last_diag"

[keys.normal.g]

# Go to
[keys.normal.space.g]
"$" = "goto_line_end"
"0" = "goto_line_start"
"d" = "goto_definition"
"g" = "goto_file_start"
"G" = "goto_file_end"
"h" = "goto_line_start"
"i" = "goto_implementation"
"l" = "goto_line_end"
"m" = [":write-all", ":new", ":insert-output lazygit", ":set mouse false", ":set mouse true", ":buffer-close!", ":redraw", ":reload-all"]  # lazygit (magit-style)
"M" = "goto_last_modification"
"t" = "goto_window_top"
"b" = "goto_window_bottom"
"c" = "goto_window_center"
"r" = "goto_reference"
"s" = "symbol_picker"
"S" = "workspace_symbol_picker"
"w" = "goto_first_nonwhitespace"
"y" = "goto_type_definition"

# Go to file
[keys.normal.space.g.f]
"a" = "goto_last_accessed_file"
"f" = "goto_file"
"h" = "goto_file_hsplit"
"v" = "goto_file_vsplit"
"m" = "goto_last_modified_file"

# Jumplist
[keys.normal.space.j]
"f" = "jump_forward"
"b" = "jump_backward"
"j" = "jumplist_picker"
"s" = "save_selection"

# LSP operations (Spacemacs SPC m / SPC l)
[keys.normal.space.l]
"a" = "code_action"
"d" = "goto_definition"
"D" = "goto_declaration"
"f" = ":format"
"h" = "hover"
"i" = "goto_implementation"
"r" = "rename_symbol"
"R" = "goto_reference"
"s" = "symbol_picker"
"S" = "workspace_symbol_picker"
"t" = "goto_type_definition"

# Increase/decrease numbers
[keys.normal.space.n]
"+" = "increment"
# "-" = "decrement"

[keys.normal.space.q]
"a" = ":quit-all"
"A" = ":quit-all!"
"c" = ":cquit"
"C" = ":cquit!"
"q" = ":quit"
"Q" = ":quit!"
"w" = ":write-quit"
"W" = ":write-quit!"

# Toggles (Spacemacs SPC t)
[keys.normal.space.t]
"c" = ":toggle cursorline"
"h" = ":toggle lsp.display-inlay-hints"
"i" = ":toggle indent-guides.render"
"n" = ":toggle line-number relative absolute"
"w" = ":toggle soft-wrap.enable"
"W" = ":toggle whitespace.render.space all none"

# Window manipulation
[keys.normal.space.w]
"q" = "no_op"           # default: wclose, instead: d
"d" = "wclose"
"h" = "jump_view_left"  # default
"j" = "jump_view_down"  # default
"k" = "jump_view_up"    # default
"l" = "jump_view_right" # default
"H" = "swap_view_left"  # default
"J" = "swap_view_down"  # default
"K" = "swap_view_up"    # default
"L" = "swap_view_right" # default
"s" = "hsplit"          # default
"v" = "vsplit"          # default
"/" = "vsplit"
# TODO: Why doesn't this work?
# "-" = "hsplit"

# Text manipulation
[keys.normal.space.x]
"u" = "switch_to_lowercase"
"U" = "switch_to_uppercase"

[keys.normal.space.x.l]
"s" = ":sort"

# Helix
[keys.normal.space.X]
"f" = ":config-open"
"r" = ":config-reload"
"t" = ":tutor"
"l" = ":log-open"

# ---------------------------------------------------------
# Insert

[keys.insert]
"C-s" = [":write", "normal_mode"]                                              # save and return to normal
"C-space" = "completion"                                                       # explicit completion trigger
j = { k = "normal_mode" }                                                      # jk to exit insert mode

# ---------------------------------------------------------
# Select

[keys.select]
"C-c" = "no_op"                 # default: toggle_comments, instead: SPC ;
"$" = "goto_line_end"
"0" = "goto_line_start"
"V" = "extend_line_below"
"G" = "goto_last_line"
"p" = "goto_next_paragraph"
"~" = "switch_case"             # vim ~ in visual mode
"H" = "select_prev_sibling"
"K" = "expand_selection"
"J" = "shrink_selection"
"L" = "select_next_sibling"
"M" = "goto_window_center"
"up" = "expand_selection"
"down" = "shrink_selection"
"left" = "select_prev_sibling"
"right" = "select_next_sibling"

[keys.select.g]
"q" = ":reflow"

# https://www.spacemacs.org/doc/DOCUMENTATION.html#executing-vim-and-emacs-exm-x-commands
[keys.select.space]
"space" = "command_palette"
"o" = "no_op"               # reserved for user in Spacemacs
";" = "toggle_comments"

# Jumplist
[keys.select.space.j]
"f" = "jump_forward"
"b" = "jump_backward"
"j" = "jumplist_picker"
"s" = "save_selection"
